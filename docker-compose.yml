version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: telegram-shop-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-telegram_shop}
      POSTGRES_USER: ${POSTGRES_USER:-telegram_bot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme123}
      TZ: Asia/Tehran
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-telegram_bot}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Adminer - Database Management UI
  adminer:
    image: adminer:latest
    container_name: telegram-shop-adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      ADMINER_DEFAULT_SERVER: postgres
      ADMINER_DESIGN: pepa-linha
      TZ: Asia/Tehran
    depends_on:
      - postgres

  # Telegram Bot
  telegram-bot:
    build: .
    container_name: telegram-shop-bot
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    environment:
      - TZ=Asia/Tehran
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=${POSTGRES_DB:-telegram_shop}
      - DB_USER=${POSTGRES_USER:-telegram_bot}
      - DB_PASSWORD=${POSTGRES_PASSWORD:-changeme123}
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
    driver: local
